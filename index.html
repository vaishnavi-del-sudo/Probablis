<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer | Team Ve</title>
    <link href="https://fonts.googleapis.com/css2?family=Delicious+Handrawn&display=swap" rel="stylesheet">
    <style>
        /* Matching your Streamlit & Diagram Colors */
        :root {
            --bg-color: #120d1a;
            --pink-accent: #FF4B91;
            --window-bg: #1e1e1e;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Delicious Handrawn', cursive, 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 4px solid var(--pink-accent);
            padding: 60px 40px;
            border-radius: 20px;
            background-color: var(--window-bg);
            box-shadow: 0 0 30px rgba(255, 75, 145, 0.2);
            max-width: 600px;
            width: 90%;
        }

        /* Expanded larger font for title */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
            color: var(--text-white);
            white-space: nowrap;
        }

        /* Subheading */
        h3 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--pink-accent);
            margin-top: 10px;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .input-simulation {
            background: #111;
            border: 2px solid #444;
            padding: 15px;
            margin: 40px auto;
            width: 250px;
            font-size: 1.5rem;
            color: var(--pink-accent);
            letter-spacing: 5px;
        }

        /* The Analyze Button */
        .analyze-btn {
            background-color: #d1d1d1;
            color: #121212;
            border: none;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 0px #666;
            text-transform: uppercase;
        }

        .analyze-btn:hover {
            background-color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--pink-accent);
        }

        .analyze-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PASSWORD <span style="color:var(--pink-accent)">*</span> ANALYZER</h1>
        <h3>By Team Ve</h3>

        <div class="input-simulation">*******</div>

        <button class="analyze-btn" onclick="redirectToApp()">
            ANALYZE
        </button>
    </div>

    <script>
        function redirectToApp() {
            // Replace with your actual streamlit URL (local or cloud)
            const streamlitURL = "http://localhost:8501/"; 
            window.location.href = streamlitURL;
        }
    </script>
</body>
</html>
